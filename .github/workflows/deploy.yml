name: Deploy frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: assume the frontend deploy role keylessly. No AWS access keys stored.
permissions:
  id-token: write
  contents: read

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Baked into the bundle at build time. Set to the deployed API URL
          # (terraform output api_url).
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Repository variables. Not secrets — the OIDC trust restricts who can
          # assume the role. Values come from terraform output.
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync dist/ "s3://${{ vars.FRONTEND_BUCKET }}/" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"