name: Deploy frontend

on:
  push:
    branches: [main]
    # Skip deploys for docs-only changes (nothing in the bundle changes).
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

# OIDC: assume the frontend deploy role keylessly. No AWS access keys stored.
permissions:
  id-token: write
  contents: read

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Baked into the bundle at build time (terraform output api_url).
          RAW_API_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          # Strip stray whitespace/newlines that can sneak into repo variables.
          export VITE_API_BASE_URL="$(printf '%s' "$RAW_API_URL" | tr -d '[:space:]')"
          npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Repository variables. Not secrets — the OIDC trust restricts who can
          # assume the role. Values come from terraform output.
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy (sync + invalidate)
        env:
          RAW_BUCKET: ${{ vars.FRONTEND_BUCKET }}
          RAW_DIST: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          BUCKET="$(printf '%s' "$RAW_BUCKET" | tr -d '[:space:]')"
          DIST="$(printf '%s' "$RAW_DIST" | tr -d '[:space:]')"
          aws s3 sync dist/ "s3://$BUCKET/" --delete
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*"